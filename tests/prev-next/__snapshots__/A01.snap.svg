3076925,1.9230769230769225 -2.435897435897436,2.179487179487179 -2.1794871794871797,2.4358974358974352 -1.9230769230769234,2.6923076923076916 -1.666666666666667,2.948717948717948 -1.4102564102564106,3.2051282051282044 -1.1538461538461542,3.461538461538461 -0.8974358974358978,3.717948717948717 -0.6410256410256414,3.9743589743589736 -0.384615384615385,4.23076923076923 -0.384615384615385,4.487179487179487 -0.384615384615385,4.743589743589743 -0.5,5" data-type="line" data-label="" points="40,348 54.35897435897442,327.1794871794872 68.71794871794873,312.8205128205128 83.07692307692312,298.4615384615385 97.43589743589743,284.10256410256414 111.7948717948718,269.7435897435898 126.15384615384613,255.38461538461542 140.5128205128205,241.02564102564105 154.87179487179486,226.66666666666669 169.23076923076923,212.30769230769235 183.5897435897436,197.94871794871798 197.94871794871793,183.58974358974362 212.3076923076923,169.23076923076928 226.66666666666666,154.87179487179492 241.025641025641,140.51282051282055 255.38461538461536,126.15384615384619 269.7435897435897,111.79487179487182 284.1025641025641,97.43589743589749 298.46153846153845,83.07692307692312 298.46153846153845,68.71794871794873 298.46153846153845,54.35897435897442 292,40" fill="none" stroke="rgba(255,0,0,0.75)" stroke-width="5.6000000000000005"/></g><g><rect data-type="rect" data-label="" data-x="0" data-y="0" x="40" y="40" width="560" height="560" fill="none" stroke="gray" stroke-width="0.017857142857142856"/></g><g id="crosshair" style="display: none"><line id="crosshair-h" y1="0" y2="640" stroke="#666" stroke-width="0.5"/><line id="crosshair-v" x1="0" x2="640" stroke="#666" stroke-width="0.5"/><text id="coordinates" font-family="monospace" font-size="12" fill="#666"></text></g><script><![CDATA[
              document.currentScript.parentElement.addEventListener('mousemove', (e) => {
                const svg = e.currentTarget;
                const rect = svg.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const crosshair = svg.getElementById('crosshair');
                const h = svg.getElementById('crosshair-h');
                const v = svg.getElementById('crosshair-v');
                const coords = svg.getElementById('coordinates');
                
                crosshair.style.display = 'block';
                h.setAttribute('x1', '0');
                h.setAttribute('x2', '640');
                h.setAttribute('y1', y);
                h.setAttribute('y2', y);
                v.setAttribute('x1', x);
                v.setAttribute('x2', x);
                v.setAttribute('y1', '0');
                v.setAttribute('y2', '640');

                // Calculate real coordinates using inverse transformation
                const matrix = {"a":56,"c":0,"e":320,"b":0,"d":-56,"f":320};
                // Manually invert and apply the affine transform
                // Since we only use translate and scale, we can directly compute:
                // x' = (x - tx) / sx
                // y' = (y - ty) / sy
                const sx = matrix.a;
                const sy = matrix.d;
                const tx = matrix.e; 
                const ty = matrix.f;
                const realPoint = {
                  x: (x - tx) / sx,
                  y: (y - ty) / sy // Flip y back since we used negative scale
                }
                
                coords.textContent = `(${realPoint.x.toFixed(2)}, ${realPoint.y.toFixed(2)})`;
                coords.setAttribute('x', (x + 5).toString());
                coords.setAttribute('y', (y - 5).toString());
              });
              document.currentScript.parentElement.addEventListener('mouseleave', () => {
                document.currentScript.parentElement.getElementById('crosshair').style.display = 'none';
              });
            ]]></script></svg>