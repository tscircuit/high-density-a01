type="line" data-label="" points="40,348 40,327.1794871794872 40,312.8205128205128 40,298.46153846153845 40,284.1025641025641 40,269.7435897435897 40,255.3846153846154 40,241.02564102564105 40,226.66666666666669 40,212.30769230769232 40,197.94871794871796 54.35897435897442,197.94871794871796 68.71794871794873,197.94871794871796 83.07692307692312,197.94871794871796 97.43589743589746,197.94871794871796 111.79487179487182,197.94871794871796 126.15384615384616,197.94871794871796 140.51282051282053,197.94871794871796 162.05128205128207,190.76923076923077 162.05128205128207,162.05128205128207 169.23076923076925,140.51282051282053 183.5897435897436,140.51282051282053 197.94871794871796,140.51282051282053 197.94871794871796,126.15384615384616 212.30769230769232,126.15384615384616 212.30769230769232,111.79487179487182 226.66666666666669,111.79487179487182 226.66666666666669,97.43589743589746 241.02564102564105,97.43589743589746 241.02564102564105,83.07692307692312 255.3846153846154,83.07692307692312 255.3846153846154,68.71794871794873 255.3846153846154,54.35897435897442 255.3846153846154,40 269.7435897435897,40 284.1025641025641,40 292,40" fill="none" stroke="rgba(255,0,0,0.800)" stroke-width="5.6000000000000005"/></g><g><rect data-type="rect" data-label="" data-x="0" data-y="0" x="40" y="40" width="560" height="560" fill="none" stroke="gray" stroke-width="0.017857142857142856"/></g><text data-type="text" data-label="[solved, best 2/1]" data-x="-5" data-y="5" x="40" y="40" fill="black" font-size="7.840000000000001" font-family="sans-serif" text-anchor="start" dominant-baseline="text-after-edge">[solved, best 2/1]</text><g id="crosshair" style="display: none"><line id="crosshair-h" y1="0" y2="640" stroke="#666" stroke-width="0.5"/><line id="crosshair-v" x1="0" x2="640" stroke="#666" stroke-width="0.5"/><text id="coordinates" font-family="monospace" font-size="12" fill="#666"></text></g><script><![CDATA[
              document.currentScript.parentElement.addEventListener('mousemove', (e) => {
                const svg = e.currentTarget;
                const rect = svg.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const crosshair = svg.getElementById('crosshair');
                const h = svg.getElementById('crosshair-h');
                const v = svg.getElementById('crosshair-v');
                const coords = svg.getElementById('coordinates');
                
                crosshair.style.display = 'block';
                h.setAttribute('x1', '0');
                h.setAttribute('x2', '640');
                h.setAttribute('y1', y);
                h.setAttribute('y2', y);
                v.setAttribute('x1', x);
                v.setAttribute('x2', x);
                v.setAttribute('y1', '0');
                v.setAttribute('y2', '640');

                // Calculate real coordinates using inverse transformation
                const matrix = {"a":56,"c":0,"e":320,"b":0,"d":-56,"f":320};
                // Manually invert and apply the affine transform
                // Since we only use translate and scale, we can directly compute:
                // x' = (x - tx) / sx
                // y' = (y - ty) / sy
                const sx = matrix.a;
                const sy = matrix.d;
                const tx = matrix.e; 
                const ty = matrix.f;
                const realPoint = {
                  x: (x - tx) / sx,
                  y: (y - ty) / sy // Flip y back since we used negative scale
                }
                
                coords.textContent = `(${realPoint.x.toFixed(2)}, ${realPoint.y.toFixed(2)})`;
                coords.setAttribute('x', (x + 5).toString());
                coords.setAttribute('y', (y - 5).toString());
              });
              document.currentScript.parentElement.addEventListener('mouseleave', () => {
                document.currentScript.parentElement.getElementById('crosshair').style.display = 'none';
              });
            ]]></script></svg>