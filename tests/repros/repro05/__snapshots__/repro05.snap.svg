72728,-8.571003774720566 3.6837056824636454,-8.571003774720566 3.580160799254563,-8.571003774720566 3.4766159160454797,-8.571003774720566 3.3730710328363975,-8.571003774720566 3.269526149627314,-8.571003774720566 3.1659812664182314,-8.571003774720566 3.1659812664182314,-8.675004000000039 3.129446150000087,-8.675004000000039" data-type="line" data-label="" points="434.7240164059076,490.1411467600635 413.9490681740175,490.1411467600635 393.17411994212773,490.1411467600635 372.39917171023797,490.1411467600635 351.6242234783481,490.1411467600635 330.8492752464582,490.1411467600635 310.0743270145682,490.1411467600635 289.29937878267845,490.1411467600635 268.52443055078857,490.1411467600635 247.74948231889869,490.1411467600635 226.97453408700892,490.1411467600635 206.19958585511893,490.1411467600635 185.42463762322905,490.1411467600635 164.6496893913394,490.1411467600635 143.8747411594494,490.1411467600635 123.09979292755963,490.1411467600635 102.32484469566964,490.1411467600635 81.54989646377976,490.1411467600635 81.54989646377976,511.0074535182946 74.21959554779562,511.0074535182946" fill="none" stroke="rgba(255,0,0,0.75)" stroke-width="20.063713037311647"/></g><g><rect data-type="rect" data-label="" data-x="4.354445750000032" data-y="-7.699999600000035" x="40" y="119.76328368396867" width="560" height="391.24416983432593" fill="none" stroke="gray" stroke-width="0.004984122321428451"/></g><circle data-type="circle" data-label="" data-x="4.9262442809726394" data-y="-8.571003774720566" cx="434.7240164059076" cy="490.1411467600635" r="30.09556955596747" fill="rgba(0,0,0,0.3)" stroke="black" stroke-width="0.004984122321428451"/><g id="crosshair" style="display: none"><line id="crosshair-h" y1="0" y2="640" stroke="#666" stroke-width="0.5"/><line id="crosshair-v" x1="0" x2="640" stroke="#666" stroke-width="0.5"/><text id="coordinates" font-family="monospace" font-size="12" fill="#666"></text></g><script><![CDATA[
              document.currentScript.parentElement.addEventListener('mousemove', (e) => {
                const svg = e.currentTarget;
                const rect = svg.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const crosshair = svg.getElementById('crosshair');
                const h = svg.getElementById('crosshair-h');
                const v = svg.getElementById('crosshair-v');
                const coords = svg.getElementById('coordinates');
                
                crosshair.style.display = 'block';
                h.setAttribute('x1', '0');
                h.setAttribute('x2', '640');
                h.setAttribute('y1', y);
                h.setAttribute('y2', y);
                v.setAttribute('x1', x);
                v.setAttribute('x2', x);
                v.setAttribute('y1', '0');
                v.setAttribute('y2', '640');

                // Calculate real coordinates using inverse transformation
                const matrix = {"a":200.63713037311646,"c":0,"e":-553.6634996454193,"b":0,"d":-200.63713037311646,"f":-1229.52045501702};
                // Manually invert and apply the affine transform
                // Since we only use translate and scale, we can directly compute:
                // x' = (x - tx) / sx
                // y' = (y - ty) / sy
                const sx = matrix.a;
                const sy = matrix.d;
                const tx = matrix.e; 
                const ty = matrix.f;
                const realPoint = {
                  x: (x - tx) / sx,
                  y: (y - ty) / sy // Flip y back since we used negative scale
                }
                
                coords.textContent = `(${realPoint.x.toFixed(2)}, ${realPoint.y.toFixed(2)})`;
                coords.setAttribute('x', (x + 5).toString());
                coords.setAttribute('y', (y - 5).toString());
              });
              document.currentScript.parentElement.addEventListener('mouseleave', () => {
                document.currentScript.parentElement.getElementById('crosshair').style.display = 'none';
              });
            ]]></script></svg>