a-label="source_net_0_mst10" data-x="11.582663433333332" data-y="3.643795300000007" cx="419.14404865304164" cy="42.63318119737539" r="3" fill="blue"/></g><g><circle data-type="point" data-label="source_net_0_mst10" data-x="12.294996000000005" data-y="3.643795300000007" cx="474.8971046904046" cy="42.63318119737539" r="3" fill="red"/></g><g><circle data-type="point" data-label="source_net_15" data-x="13.851495299999996" data-y="-1.3000001499999911" cx="596.7216523186238" cy="429.5756258632367" r="3" fill="blue"/></g><g><circle data-type="point" data-label="source_net_15" data-x="7.703836988888882" data-y="-3.4437952999999935" cx="115.55491313411017" cy="597.3668188026246" r="3" fill="blue"/></g><g><circle data-type="point" data-label="source_net_1_mst2" data-x="6.738504699999993" data-y="-0.6604017666666571" cx="40.000000000000114" cy="379.51535040193437" r="3" fill="blue"/></g><g><circle data-type="point" data-label="source_net_1_mst2" data-x="13.851495299999996" data-y="-2.00000022499999" cx="596.7216523186238" cy="484.3634387948551" r="3" fill="blue"/></g><g><circle data-type="point" data-label="source_net_7" data-x="9.184501566666661" data-y="-3.4437952999999935" cx="231.4440062913684" cy="597.3668188026246" r="3" fill="blue"/></g><g><circle data-type="point" data-label="source_net_7" data-x="6.738504699999992" data-y="2.8999944000000024" cx="40.000000000000114" cy="100.84921005647183" r="3" fill="red"/></g><g><circle data-type="point" data-label="source_net_13" data-x="8.857554277777782" data-y="3.643795300000007" cx="205.8543991729067" cy="42.63318119737539" r="3" fill="blue"/></g><g><circle data-type="point" data-label="source_net_13" data-x="6.738504699999993" data-y="-3.1843977999999913" cx="40.000000000000114" cy="577.0642185422895" r="3" fill="blue"/></g><g><circle data-type="point" data-label="source_net_0_mst8" data-x="11.494997599999998" data-y="-3.4437952999999935" cx="412.2825932779673" cy="597.3668188026246" r="3" fill="red"/></g><g><circle data-type="point" data-label="source_net_0_mst8" data-x="12.294996000000005" data-y="3.643795300000007" cx="474.8971046904046" cy="42.63318119737539" r="3" fill="red"/></g><g><circle data-type="point" data-label="source_net_20_mst0" data-x="13.094994399999997" data-y="3.643795300000007" cx="537.5116161028408" cy="42.63318119737539" r="3" fill="red"/></g><g><circle data-type="point" data-label="source_net_20_mst0" data-x="13.851495299999996" data-y="2.900000300000002" cx="596.7216523186238" cy="100.84874827352661" r="3" fill="blue"/></g><g><polyline data-points="13.851495299999996,0.12868430636167555 13.851495299999996,0.2307551522577232 13.743381323552416,0.2307551522577232 13.743381323552416,0.3328259981537708 13.743381323552416,0.43489684404981843 13.743381323552416,0.5369676899458661" data-type="line" data-label="" points="596.7216523186238,317.7549282248058 596.7216523186238,309.76601706543954 588.2597556296795,309.76601706543954 588.2597556296795,301.7771059060733 588.2597556296795,293.788194746707 588.2597556296795,285.79928358734077" fill="none" stroke="rgba(0,0,255,0.75)" stroke-width="7.826829580213751"/></g><g><polyline data-points="13.743381323552416,0.5369676899458661 13.851495299999996,0.5369676899458661" data-type="line" data-label="" points="588.2597556296795,285.79928358734077 596.7216523186238,285.79928358734077" fill="none" stroke="rgba(255,0,0,0.75)" stroke-width="7.826829580213751"/></g><g><rect data-type="rect" data-label="" data-x="10.294999999999995" data-y="0.10000000000000675" x="40.000000000000114" y="42.63318119737539" width="556.7216523186237" height="554.7336376052492" fill="none" stroke="gray" stroke-width="0.01277656539920076"/></g><circle data-type="circle" data-label="" data-x="13.743381323552416" data-y="0.5369676899458661" cx="588.2597556296795" cy="285.79928358734077" r="11.740244370320625" fill="rgba(0,0,0,0.3)" stroke="black" stroke-width="0.01277656539920076"/><g id="crosshair" style="display: none"><line id="crosshair-h" y1="0" y2="640" stroke="#666" stroke-width="0.5"/><line id="crosshair-v" x1="0" x2="640" stroke="#666" stroke-width="0.5"/><text id="coordinates" font-family="monospace" font-size="12" fill="#666"></text></g><script><![CDATA[
              document.currentScript.parentElement.addEventListener('mousemove', (e) => {
                const svg = e.currentTarget;
                const rect = svg.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const crosshair = svg.getElementById('crosshair');
                const h = svg.getElementById('crosshair-h');
                const v = svg.getElementById('crosshair-v');
                const coords = svg.getElementById('coordinates');
                
                crosshair.style.display = 'block';
                h.setAttribute('x1', '0');
                h.setAttribute('x2', '640');
                h.setAttribute('y1', y);
                h.setAttribute('y2', y);
                v.setAttribute('x1', x);
                v.setAttribute('x2', x);
                v.setAttribute('y1', '0');
                v.setAttribute('y2', '640');

                // Calculate real coordinates using inverse transformation
                const matrix = {"a":78.2682958021375,"c":0,"e":-487.41127912369313,"b":0,"d":-78.2682958021375,"f":327.8268295802143};
                // Manually invert and apply the affine transform
                // Since we only use translate and scale, we can directly compute:
                // x' = (x - tx) / sx
                // y' = (y - ty) / sy
                const sx = matrix.a;
                const sy = matrix.d;
                const tx = matrix.e; 
                const ty = matrix.f;
                const realPoint = {
                  x: (x - tx) / sx,
                  y: (y - ty) / sy // Flip y back since we used negative scale
                }
                
                coords.textContent = `(${realPoint.x.toFixed(2)}, ${realPoint.y.toFixed(2)})`;
                coords.setAttribute('x', (x + 5).toString());
                coords.setAttribute('y', (y - 5).toString());
              });
              document.currentScript.parentElement.addEventListener('mouseleave', () => {
                document.currentScript.parentElement.getElementById('crosshair').style.display = 'none';
              });
            ]]></script></svg>