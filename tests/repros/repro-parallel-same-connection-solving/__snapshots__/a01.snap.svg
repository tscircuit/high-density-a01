9697054 249.2929292929293,51.31313131313135 254.94949494949498,45.65656565656565 260.6060606060606,40 266.26262626262627,40 271.919191919192,40 277.5757575757576,40 283.23232323232327,40 288.8888888888889,40 294.54545454545456,40 300.20202020202026,40 305.85858585858585,40 311.51515151515156,40 317.1717171717172,40 322.8282828282829,40 328.4848484848485,40 334.14141414141415,40 339.79797979797985,40 345.4545454545455,40 351.1111111111112,40 356.7676767676768,40 362.42424242424244,40 368.08080808080814,40 373.7373737373738,40 379.39393939393943,40 385.0505050505051,40 390.7070707070707,40 396.3636363636364,40 402.020202020202,40 407.6767676767677,40 413.33333333333337,40 418.98989898989896,40 424.64646464646466,40 430.3030303030303,40 432,40.000000000000114" fill="none" stroke="rgba(255,0,0,0.75)" stroke-width="5.6"/></g><g><rect data-type="rect" data-label="" data-x="0" data-y="0" x="40.00000000000006" y="40.000000000000114" width="560" height="559.9999999999999" fill="none" stroke="gray" stroke-width="0.01785714285714286"/></g><g id="crosshair" style="display: none"><line id="crosshair-h" y1="0" y2="640" stroke="#666" stroke-width="0.5"/><line id="crosshair-v" x1="0" x2="640" stroke="#666" stroke-width="0.5"/><text id="coordinates" font-family="monospace" font-size="12" fill="#666"></text></g><script><![CDATA[
              document.currentScript.parentElement.addEventListener('mousemove', (e) => {
                const svg = e.currentTarget;
                const rect = svg.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const crosshair = svg.getElementById('crosshair');
                const h = svg.getElementById('crosshair-h');
                const v = svg.getElementById('crosshair-v');
                const coords = svg.getElementById('coordinates');
                
                crosshair.style.display = 'block';
                h.setAttribute('x1', '0');
                h.setAttribute('x2', '640');
                h.setAttribute('y1', y);
                h.setAttribute('y2', y);
                v.setAttribute('x1', x);
                v.setAttribute('x2', x);
                v.setAttribute('y1', '0');
                v.setAttribute('y2', '640');

                // Calculate real coordinates using inverse transformation
                const matrix = {"a":55.99999999999999,"c":0,"e":320,"b":0,"d":-55.99999999999999,"f":320.00000000000006};
                // Manually invert and apply the affine transform
                // Since we only use translate and scale, we can directly compute:
                // x' = (x - tx) / sx
                // y' = (y - ty) / sy
                const sx = matrix.a;
                const sy = matrix.d;
                const tx = matrix.e; 
                const ty = matrix.f;
                const realPoint = {
                  x: (x - tx) / sx,
                  y: (y - ty) / sy // Flip y back since we used negative scale
                }
                
                coords.textContent = `(${realPoint.x.toFixed(2)}, ${realPoint.y.toFixed(2)})`;
                coords.setAttribute('x', (x + 5).toString());
                coords.setAttribute('y', (y - 5).toString());
              });
              document.currentScript.parentElement.addEventListener('mouseleave', () => {
                document.currentScript.parentElement.getElementById('crosshair').style.display = 'none';
              });
            ]]></script></svg>